version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: firefly_postgres
    environment:
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: firefly_scheduler
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: firefly_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: firefly_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: firefly_admin
      MINIO_ROOT_PASSWORD: changeme_minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  scheduler:
    build: .
    container_name: firefly_scheduler
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: firefly_scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: firefly_admin
      MINIO_SECRET_KEY: changeme_minio_password
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: CHANGE_ME_IN_PRODUCTION_USE_256_BIT_KEY
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
  minio_data:
