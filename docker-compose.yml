version: '3.8'

services:
  # ─────────────────────────────────────
  # API 服务（FastAPI 调度中心）
  # ─────────────────────────────────────
  api:
    build: .
    container_name: firefly-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://firefly:firefly123@db:5432/firefly
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=firefly
      - MINIO_SECRET_KEY=firefly123456
      - MINIO_BUCKET=firefly-tasks
      - JWT_SECRET=change-me-to-a-random-256-bit-secret
      - JWT_ACCESS_EXPIRE=86400
      - JWT_REFRESH_EXPIRE=604800
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./app:/app/app  # 开发模式：本地代码热挂载
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────
  # PostgreSQL 数据库
  # ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: firefly-db
    environment:
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly123
      POSTGRES_DB: firefly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firefly -d firefly"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────
  # Redis（任务队列 + 分布式锁 + 心跳缓存）
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: firefly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────
  # MinIO（任务包 / 结果文件对象存储）
  # ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: firefly-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: firefly
      MINIO_ROOT_PASSWORD: firefly123456
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

# ─────────────────────────────────────
# 持久化卷
# ─────────────────────────────────────
volumes:
  pgdata:
  miniodata:
