name: CI · Scheduler
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Lint
        run: pip install ruff && ruff check app/
      - name: Test
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres redis
          sleep 5
          pytest tests/ -v --tb=short || true

  docker-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          docker build -f docker/Dockerfile -t ghcr.io/xuzhefireflylm/scheduler:${{ github.sha }} -t ghcr.io/xuzhefireflylm/scheduler:latest .
          docker push --all-tags ghcr.io/xuzhefireflylm/scheduler