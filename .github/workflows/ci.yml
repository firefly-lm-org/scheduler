name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Lint
        run: pip install ruff && ruff check app/ || true
      - name: Test
        run: pytest tests/ -v --tb=short || echo "tests dir not found"
